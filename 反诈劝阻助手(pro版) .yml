    - data:
        code: "import re\nimport json\nimport requests\nfrom typing import Dict, List,\
          \ Set, Tuple, Any\n\n# =========================\n# ✅ 阿里云 Qwen-VL-Plus 配置\n\
          # =========================\nQWEN_VL_URL = \"https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation\"\
          \nQWEN_API_KEY = \"sk-xxxxxxxxxxxxxxxxxxxxxxxx\"  # ← 务必换成你的真实 API Key\n\
          \nHEADERS = {\n    \"Authorization\": f\"Bearer {QWEN_API_KEY}\",\n    \"\
          Content-Type\": \"application/json\"\n}\n\n# =========================\n\
          # ✅ 图片分析函数（防崩溃版）\n# =========================\ndef qwen_vl_plus_analyze(image_url:\
          \ str) -> str:\n    \"\"\"\n    使用 qwen-vl-plus 分析图片（反诈专用）\n    返回图片的简短文字描述\n\
          \    \"\"\"\n    payload = {\n        \"model\": \"qwen-vl-plus\",\n   \
          \     \"input\": {\n            \"messages\": [\n                {\n   \
          \                 \"role\": \"user\",\n                    \"content\":\
          \ [\n                        {\n                            \"type\": \"\
          text\",\n                            \"text\": (\n                     \
          \           \"你是反诈专家。\"\n                                \"请分析这张图片是否可能涉及诈骗，例如：\"\
          \n                                \"转账截图、伪造证件、虚假客服、钓鱼链接、二维码、\"\n       \
          \                         \"虚假投资平台、冒充官方人员等。\"\n                        \
          \        \"请用简练中文描述图片中的关键内容，不超过150字。\"\n                            )\n\
          \                        },\n                        {\n               \
          \             \"type\": \"image\",\n                            \"image\"\
          : image_url\n                        }\n                    ]\n        \
          \        }\n            ]\n        }\n    }\n\n    try:\n        r = requests.post(QWEN_VL_URL,\
          \ headers=HEADERS, json=payload, timeout=20)\n        r.raise_for_status()\n\
          \        data = r.json()\n        content = data[\"output\"][\"choices\"\
          ][0][\"message\"][\"content\"].strip()\n        # 防止返回过长，截断处理\n        return\
          \ content[:200] + \"…\" if len(content) > 200 else content\n    except Exception\
          \ as e:\n        # 出错时返回空字符串，不影响主流程\n        return \"\"\n\n# =========================\n\
          # ✅ 图片提取（只取第一张，防异常）\n# =========================\ndef extract_image_text(files:\
          \ Any) -> str:\n    \"\"\"\n    从 Dify 传入的 files 中提取第一张图片并分析\n    \"\"\"\
          \n    if not isinstance(files, list):\n        return \"\"\n\n    for f\
          \ in files:\n        if not isinstance(f, dict):\n            continue\n\
          \        if f.get(\"type\", \"\").startswith(\"image/\"):\n            url\
          \ = f.get(\"url\")\n            if url:\n                return qwen_vl_plus_analyze(url)\n\
          \    return \"\"\n\n# =========================\n# ✅ 你原来的规则函数（完全不动）\n# =========================\n\
          \ndef smart_tokenize(text: str) -> Tuple[Set[str], List[str]]:\n    if not\
          \ text or not isinstance(text, str):\n        return set(), []\n    text_lower\
          \ = text.lower().strip()\n    pattern = r'[\\u4e00-\\u9fa5]{2,}|[a-z]{2,}|\\\
          d+'\n    tokens = re.findall(pattern, text_lower)\n    if not tokens:\n\
          \        tokens = list(text_lower)\n    return set(tokens), tokens\n\ndef\
          \ contains_fraud_context(text: str, tokens: List[str]) -> bool:\n    if\
          \ not text or not tokens:\n        return False\n    text_lower = text.lower()\n\
          \    actions = [\"打电话说\",\"发短信\",\"加微信\",\"加qq\",\"下载\",\"安装\",\"点击\",\n\
          \               \"转账\",\"汇款\",\"支付\",\"充值\",\"投资\",\"理财\",\"刷单\",\"做任务\"\
          ,\n               \"退款\",\"理赔\",\"赔偿\",\"中奖\",\"领奖\",\"贷款\",\"借款\",\"借钱\"\
          ,\n               \"验证码\",\"密码\",\"账号\",\"银行卡\",\"身份证\",\"远程\",\"共享\"]\n\
          \    scenes = [\"客服说\",\"快递说\",\"公安局\",\"检察院\",\"法院\",\"领导让\",\n       \
          \       \"老板让\",\"朋友借\",\"亲戚借\",\"网友让\",\"导师带\",\"内部消息\",\n            \
          \  \"稳赚不赔\",\"高额回报\",\"零风险\",\"日结\",\"兼职\",\"在家做\"]\n    for a in actions:\n\
          \        if a in text_lower:\n            return True\n    for s in scenes:\n\
          \        if s in text_lower:\n            return True\n    me = [\"我接到\"\
          ,\"我收到\",\"我遇到\",\"我被\",\"我有\",\"我要\",\"我想\"]\n    for p in me:\n      \
          \  if p in text_lower:\n            for t in tokens:\n                if\
          \ len(t)>=2 and t in [\"诈骗\",\"骗局\",\"骗子\",\"骗钱\",\"骗了\"]:\n           \
          \         return True\n    return False\n\ndef is_irrelevant_topic(text:\
          \ str, tokens: List[str]) -> bool:\n    if not text:\n        return True\n\
          \    text_lower = text.lower()\n    words = [\"小狗\",\"小猫\",\"宠物\",\"狗狗\"\
          ,\"猫猫\",\"动物\",\"你好\",\"在吗\",\"哈喽\",\n             \"天气\",\"下雨\",\"晴天\"\
          ,\"吃饭\",\"美食\",\"餐厅\",\"外卖\",\"今天\",\"明天\",\"电影\"]\n    for w in words:\n\
          \        if w in text_lower:\n            return True\n    if len(text_lower.strip())\
          \ <= 4:\n        return True\n    return False\n\n# =========================\n\
          # ✅ 主函数（核心修复点）\n# =========================\n\ndef main(test: str, money_sent:\
          \ str, **kwargs) -> Dict[str, Any]:\n    \"\"\"\n    kwargs 用于吸收 Dify 可能多传的参数（如\
          \ file_type）\n    \"\"\"\n    # 从 kwargs 中安全地取出 files\n    files = kwargs.get(\"\
          files\", [])\n\n    text_raw = str(test) if test is not None else \"\"\n\
          \    money_sent_raw = str(money_sent) if money_sent is not None else \"\"\
          \n\n    # 提取图片描述\n    image_text = extract_image_text(files)\n\n    # 拼接文本（仅在图片有描述时拼接）\n\
          \    if image_text:\n        combined_text = f\"{text_raw} [图片描述: {image_text}]\"\
          \n    else:\n        combined_text = text_raw\n\n    user_words, token_list\
          \ = smart_tokenize(combined_text)\n\n    # ✅ 修复点：仅用原始文本判断是否为闲聊，避免图片描述干扰\n\
          \    if is_irrelevant_topic(text_raw, token_list):\n        return {\n \
          \           \"rule_hit\": False,\n            \"fraud_candidates_rule_\"\
          : \"\",\n            \"signals_rule_\": \"\",\n            \"risk_level_rule_\"\
          : \"低\",\n            \"money_sent_\": money_sent_raw,\n            \"retrieval_query_rule_\"\
          : combined_text\n        }\n\n    has_fraud_context = contains_fraud_context(combined_text,\
          \ token_list)\n    doubtful = any(k in combined_text.lower() for k in [\"\
          咨询\",\"询问\",\"是不是\",\"真的吗\",\"怎么回事\"])\n\n    rules = [\n        (\"冒充客服退款/快递理赔\"\
          , [\"客服.*退款\",\"快递.*理赔\",\"下载.*app\"], \"高\", 2, True),\n        (\"刷单返利/做任务\"\
          , [\"刷单\",\"做任务\",\"垫付\"], \"高\", 2, True),\n        (\"投资理财/杀猪盘\", [\"\
          投资\",\"稳赚\",\"导师带\"], \"高\", 2, True),\n        (\"冒充领导/熟人转账\", [\"领导\"\
          ,\"老板\",\"急用钱\"], \"高\", 2, True),\n        (\"钓鱼链接/木马APP\", [\"链接\",\"\
          验证码\",\"安装\"], \"高\", 2, True),\n    ]\n\n    candidates, signals, levels\
          \ = [], [], []\n\n    for name, patterns, level, th, need_ctx in rules:\n\
          \        t = th\n        if doubtful:\n            t += 1\n        if need_ctx\
          \ and not has_fraud_context:\n            t += 2\n        matched = [p for\
          \ p in patterns if re.search(p, combined_text, re.I)]\n        if len(matched)\
          \ >= t:\n            candidates.append(name)\n            levels.append(level)\n\
          \            signals.extend([f\"{name}::{p}\" for p in matched])\n\n   \
          \ risk = \"低\"\n    if \"高\" in levels:\n        risk = \"高\"\n    elif\
          \ \"中\" in levels:\n        risk = \"中\"\n\n    return {\n        \"rule_hit\"\
          : bool(candidates),\n        \"fraud_candidates_rule_\": \"、\".join(set(candidates)),\n\
          \        \"signals_rule_\": \"；\".join(set(signals)),\n        \"risk_level_rule_\"\
          : risk,\n        \"money_sent_\": money_sent_raw,\n        \"retrieval_query_rule_\"\
          : combined_text\n    }"
        code_language: python3
