    - data:
        code: "import json\nimport re\nfrom typing import Dict, Any, List, Tuple\n\
          \ndef _calculate_similarity_score(query: str, context: str) -> float:\n\
          \    if not query or not context:\n        return 0.0\n    query_norm =\
          \ str(query).lower()\n    context_norm = str(context).lower()\n    query_words\
          \ = set(re.findall(r'[\\u4e00-\\u9fa5a-zA-Z0-9]+', query_norm))\n    context_words\
          \ = set(re.findall(r'[\\u4e00-\\u9fa5a-zA-Z0-9]+', context_norm))\n    if\
          \ not query_words:\n        return 0.0\n    intersection = query_words.intersection(context_words)\n\
          \    return len(intersection) / len(query_words)\n\ndef _parse_llm_classifier_output(classifier_text:\
          \ str) -> Tuple[str, List[str]]:\n    risk = \"中\"\n    signals = []\n \
          \   if not classifier_text:\n        return risk, signals\n    try:\n  \
          \      data = json.loads(classifier_text)\n        if isinstance(data, dict):\n\
          \            risk = data.get(\"risk_level\", risk)\n            key_sigs\
          \ = data.get(\"key_signals\", [])\n            if isinstance(key_sigs, list):\n\
          \                signals = [str(s) for s in key_sigs if s]\n    except json.JSONDecodeError:\n\
          \        try:\n            pattern = r'\\{[^{}]*\\}'\n            matches\
          \ = re.findall(pattern, classifier_text, re.DOTALL)\n            if matches:\n\
